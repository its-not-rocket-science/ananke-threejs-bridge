<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ananke Three.js Bridge — Demo</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #0d0d1a;
        color: #c8d0e0;
        font-family: "Segoe UI", system-ui, sans-serif;
        overflow: hidden;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      #canvas-container {
        position: relative;
        flex: 1;
        overflow: hidden;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* HUD overlay */
      #hud {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        padding: 12px 16px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        pointer-events: none;
      }

      #hud-left {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      #hud-right {
        text-align: right;
        font-size: 11px;
        opacity: 0.7;
        line-height: 1.8;
      }

      .entity-bar {
        background: rgba(0,0,0,0.55);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 6px;
        padding: 6px 10px;
        min-width: 200px;
        font-size: 12px;
      }

      .entity-name {
        font-weight: 600;
        margin-bottom: 4px;
        font-size: 13px;
      }

      .entity-name.team1 { color: #5599ff; }
      .entity-name.team2 { color: #ff5533; }

      .bar-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 3px;
      }

      .bar-label {
        width: 60px;
        font-size: 10px;
        opacity: 0.7;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .bar-track {
        flex: 1;
        height: 6px;
        background: rgba(255,255,255,0.1);
        border-radius: 3px;
        overflow: hidden;
      }

      .bar-fill {
        height: 100%;
        border-radius: 3px;
        transition: width 50ms linear;
      }

      .bar-fill.health   { background: #44cc66; }
      .bar-fill.shock    { background: #ff4422; }
      .bar-fill.fear     { background: #cc8822; }

      .entity-status {
        font-size: 10px;
        margin-top: 2px;
        opacity: 0.6;
        min-height: 14px;
      }

      /* Controls bar */
      #controls {
        background: rgba(0,0,0,0.7);
        border-top: 1px solid rgba(255,255,255,0.08);
        padding: 8px 16px;
        display: flex;
        gap: 20px;
        align-items: center;
        font-size: 12px;
        flex-wrap: wrap;
        pointer-events: all;
      }

      label {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        white-space: nowrap;
      }

      select, input[type="number"] {
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.18);
        color: #c8d0e0;
        border-radius: 4px;
        padding: 3px 6px;
        font-size: 12px;
      }

      button {
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        color: #c8d0e0;
        border-radius: 4px;
        padding: 4px 12px;
        cursor: pointer;
        font-size: 12px;
        transition: background 0.15s;
      }

      button:hover { background: rgba(255,255,255,0.18); }
      button:active { background: rgba(255,255,255,0.06); }

      #tick-display {
        opacity: 0.5;
        font-size: 11px;
        margin-left: auto;
      }
    </style>
  </head>
  <body>
    <div id="canvas-container">
      <canvas id="ananke-canvas"></canvas>

      <!-- HUD overlay -->
      <div id="hud">
        <div id="hud-left">
          <!-- Entity bars populated by JS -->
          <div class="entity-bar" id="bar-entity-1">
            <div class="entity-name team1">Knight (Team 1)</div>
            <div class="bar-row">
              <span class="bar-label">Conscious</span>
              <div class="bar-track"><div class="bar-fill health" id="bar1-consciousness" style="width:100%"></div></div>
            </div>
            <div class="bar-row">
              <span class="bar-label">Shock</span>
              <div class="bar-track"><div class="bar-fill shock" id="bar1-shock" style="width:0%"></div></div>
            </div>
            <div class="bar-row">
              <span class="bar-label">Fear</span>
              <div class="bar-track"><div class="bar-fill fear" id="bar1-fear" style="width:0%"></div></div>
            </div>
            <div class="entity-status" id="status-1">idle</div>
          </div>

          <div class="entity-bar" id="bar-entity-2">
            <div class="entity-name team2">Brawler (Team 2)</div>
            <div class="bar-row">
              <span class="bar-label">Conscious</span>
              <div class="bar-track"><div class="bar-fill health" id="bar2-consciousness" style="width:100%"></div></div>
            </div>
            <div class="bar-row">
              <span class="bar-label">Shock</span>
              <div class="bar-track"><div class="bar-fill shock" id="bar2-shock" style="width:0%"></div></div>
            </div>
            <div class="bar-row">
              <span class="bar-label">Fear</span>
              <div class="bar-track"><div class="bar-fill fear" id="bar2-fear" style="width:0%"></div></div>
            </div>
            <div class="entity-status" id="status-2">idle</div>
          </div>
        </div>

        <div id="hud-right">
          <div>Sim: 20 Hz fixed-step loop</div>
          <div>Render: requestAnimationFrame + double-buffer interpolation</div>
          <div>State: <span id="sim-status">paused</span></div>
        </div>
      </div>
    </div>

    <!-- Controls bar -->
    <div id="controls">
      <label>
        Seed:
        <input type="number" id="seed-input" value="42" min="1" max="999999" style="width:70px" />
      </label>
      <button id="start-btn">Start</button>
      <button id="reset-btn">Reset</button>
      <button id="replay-btn">Download Replay</button>
      <label>
        Speed:
        <select id="speed-select">
          <option value="1" selected>1×</option>
          <option value="2">2×</option>
          <option value="4">4×</option>
        </select>
      </label>
      <span id="tick-display">tick: 0</span>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
